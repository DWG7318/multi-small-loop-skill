interface:
  display_name: "Multi Small Loop (MSLK)"
  short_description: "Dependency-ready parallel loops with oversight"
  default_prompt: "Use only $multi-small-loop-skill (MSLK), exactly once. Never load, borrow, combine, or switch to SLK. Use one distinct visible Supervisor plus multiple visible persistent Checker/Worker pairs, never subagents or a combined role. Supervisor owns project decomposition, shared boundaries, the board, final audit, and any Owner-configured optional project Goal gate. Each Checker owns its Worker's initial and continuation GO/CELL planning, revision, assignment, validation, repair, routing, and progress. Supervisor and Checkers use gpt-5.6-sol xhigh; Workers use gpt-5.5 high through gpt-5.6-sol high by task type. Size GO by project need and CELL by computer capacity. Show project-wide accepted/total progress on every Checker task. When a Goal exists, completion requires Supervisor evidence for GOAL_SATISFIED; GOAL_GAP is allocated to affected Checkers for simulated PLAN/GO/CELL continuation."
