interface:
  display_name: "Multi Small Loop (MSLK)"
  short_description: "Dependency-ready parallel loops with oversight"
  default_prompt: "Use only $multi-small-loop-skill (MSLK), exactly once. Never load, borrow, combine, or switch to SLK. Use one distinct visible Supervisor plus multiple visible persistent Checker/Worker pairs, never subagents or a combined role. Supervisor owns project decomposition, shared boundaries, capability provisioning, the board, final audit, optional Goal validation, continuation-condition resolution, and any Owner-configured Overseer schedule. Each Checker owns its Worker's detection system, planning, assignment, independent validation, repair, routing, progress, unsafe-dispatch stops, and prerequisite revalidation. Every GO plan contains a Checker-authored, Supervisor-approved GO_DETECTION_PROFILE; its paired Checker executes the complete bundle for every CELL and writes CELL_DETECTION_RECEIPT. Every governed Markdown file has a hard 1000-physical-line maximum for Codex context readability, never device capacity. Supervisor defines semantic shards and WORK_CONTINUATION_INDEX; every Markdown-writing CELL executes markdown-line-budget and records MD_LINE_BUDGET_PASS. Never hard-cut work or borrow another Checker's evidence. For code/repository work require CodeGraph plus GO-selected mature checks. Missing capability is CONDITION_BLOCKED. Supervisor and Checkers use gpt-5.6-sol xhigh; Workers use gpt-5.5 high through gpt-5.6-sol high. Show project-wide progress; a configured Goal requires GOAL_SATISFIED."
