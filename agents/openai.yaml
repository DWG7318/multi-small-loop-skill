interface:
  display_name: "Multi Small Loop (MSLK)"
  short_description: "Dependency-ready parallel loops with oversight"
  default_prompt: "Use only $multi-small-loop-skill (MSLK), exactly once. Never load, borrow, combine, or switch to SLK. Use one distinct visible Supervisor plus multiple visible persistent Checker/Worker pairs, never subagents or a combined role. Supervisor owns project decomposition, shared boundaries, the board, final audit, optional Goal validation, and continuation-condition resolution. Each Checker owns its Worker's planning, revision, assignment, validation, repair, routing, progress, stopping unsafe dispatch, and prerequisite revalidation. Supervisor and Checkers use gpt-5.6-sol xhigh; Workers use gpt-5.5 high through gpt-5.6-sol high by task type. Show project-wide accepted/total progress. CONDITION_BLOCKED stops affected dispatch; Supervisor either requests Owner assistance or records SUPERVISOR_RESOLVED and RESUME_AUTHORIZED before waking the same Checker to revalidate. A configured Goal requires GOAL_SATISFIED."
