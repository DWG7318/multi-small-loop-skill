interface:
  display_name: "Multi Small Loop (MSLK)"
  short_description: "Dependency-ready parallel loops with oversight"
  default_prompt: "Use only $multi-small-loop-skill (MSLK), exactly once. Never load, borrow, combine, or switch to SLK. Use one distinct visible Supervisor plus multiple visible persistent Checker/Worker pairs, never subagents or a combined role. Supervisor owns project decomposition, shared boundaries, the board, and final audit. Each Checker owns its Worker's initial GO/CELL planning, revision, assignment, validation, repair, routing, and progress. Supervisor and Checkers use gpt-5.6-sol xhigh; Workers use gpt-5.5 high through gpt-5.6-sol high by task type. Size GO by project need and CELL by computer capacity. Show project-wide accepted/total progress on every Checker task until total/total. Simulate before formal work and every GO revision."
