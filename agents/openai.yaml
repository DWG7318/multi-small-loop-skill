interface:
  display_name: "Multi Small Loop (MSLK)"
  short_description: "Dependency-ready parallel loops with oversight"
  default_prompt: "Use only $multi-small-loop-skill (MSLK), exactly once. Never load, borrow, combine, or switch to SLK. Use one distinct visible Supervisor plus multiple visible persistent Checker/Worker pairs, never subagents or a combined role. Before simulation, every complete frozen-roster role must pass the independent MSLK readiness Eval with exactly 25/25; then require exact-roster SIMULATION_PASS before manual MSLK START or any formal CELL. Supervisor owns project decomposition, shared boundaries, capability provisioning, the board, final audit, optional Goal validation, continuation-condition resolution, and safe pause/same-pair resume. Each Checker owns its Worker's detection system, planning, assignment, independent validation, repair, routing, progress, unsafe-dispatch stops, and prerequisite revalidation. Every GO plan contains a Checker-authored, Supervisor-approved GO_DETECTION_PROFILE; its paired Checker executes the complete bundle for every CELL and writes CELL_DETECTION_RECEIPT. Every governed Markdown file has a hard 1000-line maximum and WORK_CONTINUATION_INDEX is a current-state pointer below 200 lines. For code/repository work require CodeGraph plus GO-selected mature checks. Missing capability is CONDITION_BLOCKED. Supervisor and Checkers use gpt-5.6-sol xhigh; Workers use gpt-5.5 high through gpt-5.6-sol high. Show project-wide progress. Every Worker assignment is the paired Checker's final action; that Checker goes offline without polling and wakes only for formal Worker completion, blocker, or execution-failure signals. Initial start is manual only, the roster is frozen, and a configured Goal requires GOAL_SATISFIED."
