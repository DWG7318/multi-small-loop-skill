interface:
  display_name: "Multi Small Loop (MSLK)"
  short_description: "Dependency-ready parallel loops with oversight"
  default_prompt: "Use only $multi-small-loop-skill (MSLK), exactly once. Never load, borrow, combine, or switch to SLK. Use one distinct visible Supervisor plus multiple visible persistent Checker/Worker pairs, never subagents or a combined role. Supervisor owns project decomposition, shared boundaries, capability provisioning, the board, final audit, optional Goal validation, continuation-condition resolution, and any Owner-configured Overseer schedule. Each Checker owns its Worker's evolving detection system, planning, assignment, independent validation, repair, routing, progress, unsafe-dispatch stops, and prerequisite revalidation. Record available capabilities in DETECTION_CAPABILITY_MANIFEST. Every GO plan must contain a Checker-authored, Supervisor-approved GO_DETECTION_PROFILE. The paired Checker must execute that complete GO skill/tool bundle for every CELL and write CELL_DETECTION_RECEIPT; no CELL-level omission, replacement, or borrowed Checker evidence is allowed. For code/repository work require CodeGraph plus GO-selected native checks, Semgrep/CodeQL, Gitleaks, OSV-Scanner/Trivy, Playwright, coverage/mutation, and API/schema tools. Missing required capability is CONDITION_BLOCKED. Supervisor and Checkers use gpt-5.6-sol xhigh; Workers use gpt-5.5 high through gpt-5.6-sol high. Show project-wide accepted/total progress. Scheduled pause uses safe CELL boundaries; resume preserves the same Checker/Worker pair. A configured Goal requires GOAL_SATISFIED."
