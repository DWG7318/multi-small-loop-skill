interface:
  display_name: "Multi Small Loop (MSLK)"
  short_description: "Dependency-ready parallel loops with oversight"
  default_prompt: "Use only $multi-small-loop-skill (MSLK), exactly once. Never load, borrow, combine, or switch to SLK. Use one distinct visible Supervisor plus multiple visible persistent Checker/Worker pairs, never subagents or a combined role. Supervisor owns project decomposition, shared boundaries, the board, final audit, optional Goal validation, continuation-condition resolution, and any Owner-configured Overseer schedule. Each Checker owns its Worker's planning, assignment, validation, repair, routing, progress, stopping unsafe dispatch, and prerequisite revalidation. Supervisor and Checkers use gpt-5.6-sol xhigh; Workers use gpt-5.5 high through gpt-5.6-sol high. Show project-wide accepted/total progress. Scheduled pause waits for safe CELL boundaries; scheduled resume never pre-creates idle Workers and wakes the same Checker only after selection, independence, and continuation gates pass. CONDITION_BLOCKED stops affected dispatch; a configured Goal requires GOAL_SATISFIED."
